{% extends "account/base.html" %}
{% load static %}

{% block account_content %}
<div class="flex flex-col items-center">
    <div class="w-full rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl shadow-slate-200/60 text-center">
        <div class="mb-3 flex justify-center">
            <img src="{% static 'assets/img/log-base-transparent.png' %}"
                 class="h-14 w-auto sm:h-16"
                 alt="RF Exposure Logo">
        </div>
        <h1 class="mb-2 text-3xl font-black text-slate-900">Password Updated</h1>
        <p class="mb-4 text-slate-500">
            Your password has been changed successfully.
        </p>
        <div class="mt-8">
            <a href="{% url 'appauth:account_login' %}"
               class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-6 py-4 font-bold text-white hover:bg-blue-600">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
